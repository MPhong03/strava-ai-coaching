workflows:
  android-build:
    name: Build AI Coach Android APK
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      node: 20
      groups:
        - strava_config # We will define this in Codemagic UI
      vars:
        PACKAGE_NAME: "com.m_phong.aicoach"
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install
      - name: Create .env file
        script: |
          cd frontend
          echo "REACT_APP_STRAVA_CLIENT_ID=$STRAVA_CLIENT_ID" >> .env
          echo "REACT_APP_STRAVA_REDIRECT_URI=$STRAVA_REDIRECT_URI" >> .env
          echo "REACT_APP_API_URL=$API_URL" >> .env
      - name: Build Web App and Sync Capacitor
        script: |
          cd frontend
          npm run build
          npx cap sync android
      - name: Build Android APK
        script: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - frontend/android/app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - ${{ secrets.USER_EMAIL }} # Optional: Set your email in Codemagic vars
        notify:
          success: true
          failure: true
